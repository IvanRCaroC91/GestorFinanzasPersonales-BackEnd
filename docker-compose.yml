version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: finanzas-postgres
    restart: unless-stopped
    
    # Variables de entorno para la base de datos
    environment:
      POSTGRES_DB: finanzas_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_HOST_AUTH_METHOD: trust
    
    # Exponer puerto para conexión local
    ports:
      - "5432:5432"
    
    # Volumen para persistencia de datos
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Montar script SQL inicial para ejecución automática
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    
    # Configuración de red
    networks:
      - finanzas-network

# Volumen para persistencia de datos de PostgreSQL
volumes:
  postgres_data:
    driver: local

# Red personalizada para los servicios
networks:
  finanzas-network:
    driver: bridge
