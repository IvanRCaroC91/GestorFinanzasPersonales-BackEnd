server:
  port: 8080

spring:
  application:
    name: ms-api-gateway
  cloud:
    gateway:
      # Configuración CORS global para WebFlux
      globalcors:
        cors-configurations:
          '[/**]':
            # Orígenes permitidos (frontend React) - usar allowedOrigins en lugar de patterns
            allowedOrigins:
              - http://localhost:5173
              - http://127.0.0.1:5173
            # Métodos HTTP permitidos
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            # Headers permitidos
            allowedHeaders:
              - "*"
            # Headers expuestos al frontend
            exposedHeaders:
              - "Authorization"
              - "Content-Type"
              - "X-Requested-With"
            # Permitir credenciales (cookies, authorization headers)
            allowCredentials: true
            # Tiempo de cache para preflight OPTIONS
            maxAge: 3600
      # Configuración de rutas existente
      routes:
        - id: auth-service
          uri: lb://ms-auth-service
          predicates:
            - Path=/api/v1/auth/**
        - id: protected-routes
          uri: lb://ms-auth-service
          predicates:
            - Path=/api/v1/protected/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.finanzas.apigateway: DEBUG

# Configuración JWT (debe coincidir con ms-auth-service)
jwt:
  secret: ${JWT_SECRET:mySecretKey123456789012345678901234567890}
